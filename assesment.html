<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: grey;
        }
        #users{
            display:flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            border:2px solid black;
        }
        .card{
            height:200px;
            width:300px;
            background-color: white;
            text-align: center;
            border-radius:20px;
            margin-top:10px;
            margin-left:10px;
            cursor:pointer;
        }
        /* .card img{

        .card1{
            height:60%;
            width:75%;
            position:fixed;
            top:100px;
            left:100px;
            background-color: aliceblue;
            padding:20px;
            border:5px solid black;
        }
        btn{
            position:fixed;
            top:30px;
            right:50px;
        }
    </style>
</head>
<body>

<div id="users">
</div>
<div id="display"></div>

<script>
fetch("https://dummyjson.com/users")
.then(response => response.json())
//  .then(data=>console.log(data))
.then(data =>{
    let users=document.getElementById("users")
    data.users.forEach(user=>{
        let card=document.createElement("div")
        card.className="card"
        let fname=document.createElement("div")
        fname.innerText+="firstname:"+user.firstName;
        let mname=document.createElement("div")
        mname.innerText="medianname:"+user.maidenName;
        let lname=document.createElement("div")
        lname.innerText="lastname:"+user.lastName;
        let age=document.createElement("h3")
        age.innerText="Age:"+user.age;
        if(user.medianName==" "){
            mname.style.display=none;
        }
        card.appendChild(fname)
        card.appendChild(mname)
        card.appendChild(lname)
        card.appendChild(age)
        users.appendChild(card)

        
        
        let sc=document.getElementById("display")                          
        card.addEventListener("click",()=> {
        sc.style.display="block"
        let singlecard = document.createElement("div");
          singlecard.className = "card1";
        let fname=document.createElement("div")
        fname.innerText+="firstname:"+user.firstName;
        let mname=document.createElement("div")
        mname.innerText="medianname:"+user.maidenName;
        let lname=document.createElement("div")
        lname.innerText="lastname:"+user.lastName;
        let age=document.createElement("h3")
        age.innerText="Age:"+user.age;
         users.style.opacity=0.2;

            let btn=document.createElement("button")
            btn.innerText="X";
            btn.addEventListener("click",()=>{
            sc.style.display="none";
             users.style.opacity=1;
            })
        singlecard.appendChild(btn)
        singlecard.appendChild(fname)
        singlecard.appendChild(mname)
        singlecard.appendChild(lname)
        singlecard.appendChild(age)
        sc.appendChild(singlecard)
        })

})
